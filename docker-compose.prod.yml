version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: arynoxtech/world-model:latest
    container_name: arynoxtech-web
    restart: always
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - LOG_LEVEL=INFO
      - DATA_DIR=/app/user_data
    volumes:
      - user_data:/app/user_data
      - ./logs:/app/logs
    networks:
      - arynoxtech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: arynoxtech-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
    networks:
      - arynoxtech-network

volumes:
  user_data:
    driver: local

networks:
  arynoxtech-network:
    driver: bridge